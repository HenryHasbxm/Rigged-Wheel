<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wheel of names</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #808080;
  transition: background 0.3s ease;
  overflow: hidden; 
}

.wrapper {
  display: flex;
  height: 100vh;
}

/* LEFT SIDE (Wheel) */
.wheel-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 20px;
}

canvas {
  max-width: 100%;
  max-height: 80vh;
  height: auto;
  filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
}

button.spin-btn {
  margin-top: 25px;
  padding: 18px 50px;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 50px;
  background: #2f80ed;
  color: white;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(47, 128, 237, 0.4);
  transition: transform 0.2s;
}

button.spin-btn:hover {
  background: #1c5dc9;
  transform: scale(1.05);
}

/* RIGHT SIDE (Names & Settings) */
.list-area {
  width: 320px;
  border-left: 1px solid rgba(255,255,255,0.2);
  padding: 20px;
  box-sizing: border-box;
  background: rgba(0, 0, 0, 0.1);
  display: flex;
  flex-direction: column;
  color: white;
}

.settings-item {
  margin-bottom: 20px;
}
.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 24px;
}

.switch input { opacity: 0; width: 0; height: 0; }

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #ccc;
  transition: .4s;
  border-radius: 24px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 16px; width: 16px;
  left: 4px; bottom: 4px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}

input:checked + .slider { background-color: #f2d600; }
input:checked + .slider:before { transform: translateX(26px); }

textarea {
  flex-grow: 1;
  width: 100%;
  resize: none;
  padding: 12px;
  font-size: 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  color: #333;
}

/* MODAL */
#winnerModal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 50px;
  border-radius: 30px;
  text-align: center;
  animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  max-width: 80%;
}

@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#winnerText {
  font-size: 64px;
  font-weight: 800;
  margin: 15px 0;
  color: #2f80ed;
}

.close-btn {
  margin-top: 20px;
  background: #333;
  padding: 10px 25px;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* PHONE LAYOUT */
@media (max-width: 768px) {
  .wrapper { flex-direction: column; }
  .list-area { width: 100%; height: auto; border-left: none; }
  textarea { height: 150px; }
}
</style>
</head>
<body>

<div id="winnerModal">
  <div class="modal-content">
    <h1 style="color:#666; margin:0;">WINNER!</h1>
    <div id="winnerText"></div>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<div class="wrapper">
  <div class="wheel-area">
    <canvas id="wheel" width="600" height="600"></canvas>
    <button class="spin-btn" onclick="spin()">SPIN WHEEL</button>
  </div>

  <div class="list-area">
    <div class="switch-container">
      <span style="font-size: 8px; font-weight: bold;">Enable Rigging</span>
      <label class="switch">
        <input type="checkbox" id="rigToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="settings-item">
      <label style="font-weight: bold; display: block; margin-bottom: 5px;">Background:</label>
      <input type="color" id="bgPicker" value="#808080" style="width: 100%; height: 35px; border:none; border-radius:5px; cursor:pointer;">
    </div>
    
    <h3 style="margin: 0 0 10px 0;">Names</h3>
    <textarea id="namesInput" placeholder="Enter names..."></textarea>
  </div>
</div>

<script>
let names = [];
let riggedIndex = -1;
let currentRotation = 0;
let spinning = false;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const textarea = document.getElementById("namesInput");
const bgPicker = document.getElementById("bgPicker");
const rigToggle = document.getElementById("rigToggle");
const modal = document.getElementById("winnerModal");
const winnerText = document.getElementById("winnerText");

const centerX = 300; 
const centerY = 300;
const radius = 300;

bgPicker.addEventListener("input", (e) => {
    document.body.style.backgroundColor = e.target.value;
});

textarea.addEventListener("input", updateNames);

function updateNames() {
  const raw = textarea.value.split("\n").map(n => n.trim()).filter(n => n);
  names = [];
  let foundRig = -1;

  raw.forEach((name, index) => {
    if (name.endsWith(",")) {
      name = name.slice(0, -1);
      foundRig = names.length;
    }
    names.push(name);
  });
  
  riggedIndex = foundRig;
  drawWheel();
}

function drawWheel() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (names.length === 0) return;
  const arc = 2 * Math.PI / names.length;
  
  for (let i = 0; i < names.length; i++) {
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.arc(centerX, centerY, radius, currentRotation + i * arc, currentRotation + (i + 1) * arc);
    ctx.fillStyle = `hsl(${i * 360 / names.length}, 70%, 55%)`;
    ctx.fill();
    
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(currentRotation + i * arc + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "white";
    ctx.font = "bold 20px Arial";
    ctx.fillText(names[i], radius - 20, 10);
    ctx.restore();
  }
  
  ctx.beginPath();
  ctx.moveTo(centerX, 0); 
  ctx.lineTo(centerX - 20, 30); 
  ctx.lineTo(centerX + 20, 30);
  ctx.fillStyle = "black"; 
  ctx.fill();
}

function spin() {
  if (spinning || names.length < 2) return;
  spinning = true;

  const arc = 2 * Math.PI / names.length;
  
  // LOGIC: Use riggedIndex ONLY if the switch is ON
  let winnerIndex;
  if (rigToggle.checked && riggedIndex !== -1) {
    winnerIndex = riggedIndex;
  } else {
    winnerIndex = Math.floor(Math.random() * names.length);
  }

  const target = (3 * Math.PI / 2) - (winnerIndex * arc) - (arc / 2);
  const extraSpins = 12 * 2 * Math.PI;
  const startRotation = currentRotation;
  const finalRotation = extraSpins + target;

  const duration = 5000;
  const startTime = performance.now();

  function animate(time) {
    const progress = Math.min((time - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 4);
    currentRotation = startRotation + (finalRotation - startRotation) * ease;
    drawWheel();
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentRotation = finalRotation % (2 * Math.PI);
      spinning = false;
      showWinner(names[winnerIndex]);
    }
  }
  requestAnimationFrame(animate);
}

function showWinner(name) {
  confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, zIndex: 200 });
  winnerText.textContent = name;
  modal.style.display = "flex";
}

function closeModal() {
  modal.style.display = "none";
}

drawWheel();
</script>

</body>
</html>
